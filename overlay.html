<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3 Scoreboard Overlay</title>
  <style>
    :root {
      --left-main: #2563ff;
      --left-dark: #123ec8;
      --right-main: #ff315b;
      --right-dark: #b50e34;
      --glass-top: rgba(17, 26, 50, 0.96);
      --glass-bottom: rgba(7, 11, 22, 0.98);
      --edge-light: rgba(255,255,255,0.15);
      --edge-dark: rgba(0,0,0,0.34);
      --text: #ffffff;
      --plate-glow: rgba(93, 124, 255, 0.12);
      --left-glow: rgba(69, 120, 255, 0.9);
      --right-glow: rgba(255, 72, 117, 0.9);
      --shadow-heavy: 0 30px 70px rgba(0, 0, 0, 0.42);
      --shadow-soft: 0 10px 26px rgba(0,0,0,0.28);
      --winner-accent: rgba(255,255,255,0.16);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: grid;
      place-items: start center;
    }

    .stage {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: transparent;
    }

    .overlay {
      position: absolute;
      left: 50%;
      top: 54px;
      transform: translateX(-50%);
      width: 1480px;
      height: 356px;
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 24px 40px rgba(0,0,0,0.30));
    }

    .top-plate {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 470px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 4.8rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      background:
        linear-gradient(180deg, rgba(24,33,61,0.98), rgba(6,10,21,0.98)),
        radial-gradient(circle at 50% 18%, rgba(91,120,255,0.18), transparent 58%);
      clip-path: polygon(12% 0, 88% 0, 100% 72%, 93% 100%, 7% 100%, 0 72%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.3),
        var(--shadow-heavy);
      z-index: 6;
    }

    .main-shell {
      position: absolute;
      inset: 92px 0 42px 0;
      display: grid;
      grid-template-columns: 1fr 350px 1fr;
      align-items: stretch;
      z-index: 2;
    }

    .team {
      position: relative;
      min-width: 0;
      overflow: hidden;
      height: 186px;
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 0 40px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.11),
        inset 0 -1px 0 rgba(0,0,0,0.18),
        0 14px 30px rgba(0,0,0,0.16);
    }

    .team.left {
      border-radius: 14px 0 0 14px;
      clip-path: polygon(0 0, 100% 0, 100% 84%, 88% 100%, 0 100%);
      background:
        linear-gradient(90deg, var(--left-dark) 0%, var(--left-main) 72%, color-mix(in srgb, var(--left-main) 78%, white 22%) 100%);
      justify-content: flex-start;
    }

    .team.right {
      border-radius: 0 14px 14px 0;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 12% 100%, 0 84%);
      background:
        linear-gradient(270deg, var(--right-dark) 0%, var(--right-main) 72%, color-mix(in srgb, var(--right-main) 78%, white 22%) 100%);
      justify-content: flex-end;
      gap: 32px;
    }

    .team::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 36%, transparent 62%, rgba(0,0,0,0.12)),
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.10), transparent 44%);
      pointer-events: none;
    }

    .player-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 28px;
      min-width: 0;
      width: 100%;
    }

    .team.right .player-wrap {
      flex-direction: row-reverse;
      justify-content: flex-start;
    }

    .avatar {
      width: 132px;
      height: 132px;
      flex: 0 0 auto;
      border-radius: 999px;
      border: 5px solid rgba(255,255,255,0.96);
      background: linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0.08)), #43506d;
      background-size: cover;
      background-position: center;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.16),
        0 12px 24px rgba(0,0,0,0.24);
    }

   .name {
  font-size: 4.2rem;
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--text);
  text-shadow: 0 4px 10px rgba(0,0,0,0.22);
  white-space: nowrap;

  max-width: 520px; /* increased */
}

    .score-core {
      position: relative;
      z-index: 5;
      height: 186px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      justify-items: center;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(26,38,70,0.98), rgba(8,12,24,0.98)),
        radial-gradient(circle at 50% 20%, rgba(93,124,255,0.14), transparent 60%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.09),
        inset 0 -1px 0 rgba(0,0,0,0.24),
        var(--shadow-heavy);
      clip-path: polygon(14% 0, 86% 0, 100% 18%, 100% 82%, 86% 100%, 14% 100%, 0 82%, 0 18%);
      overflow: hidden;
    }

    .score-core::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 18px;
      bottom: 18px;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.28), transparent);
      transform: translateX(-50%);
    }

    .score-val {
      position: relative;
      z-index: 2;
      font-size: 5.6rem;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 8px 20px rgba(0,0,0,0.30);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .bottom-plate {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 560px;
      height: 116px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(180deg, rgba(18,26,52,0.98), rgba(6,10,21,0.98)),
        radial-gradient(circle at 50% 16%, rgba(91,120,255,0.18), transparent 60%);
      clip-path: polygon(9% 0, 91% 0, 100% 38%, 94% 100%, 6% 100%, 0 38%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.34),
        var(--shadow-heavy);
      color: var(--text);
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 6;
    }

    .lane-glow {
      position: absolute;
      bottom: 18px;
      width: 200px;
      height: 10px;
      border-radius: 999px;
      filter: blur(2px);
      opacity: 0.95;
      z-index: 4;
    }

    .lane-glow.left { left: 420px; background: var(--left-glow); }
    .lane-glow.right { right: 420px; background: var(--right-glow); }

    .leader-left .team.left { box-shadow: inset 0 0 0 2px rgba(255,255,255,0.10), 0 0 32px rgba(69, 120, 255, 0.22), 0 14px 30px rgba(0,0,0,0.16); }
    .leader-right .team.right { box-shadow: inset 0 0 0 2px rgba(255,255,255,0.10), 0 0 32px rgba(255, 72, 117, 0.22), 0 14px 30px rgba(0,0,0,0.16); }

    .winner-banner {
      position: absolute;
      left: 50%;
      top: 212px;
      transform: translateX(-50%) scale(0.92);
      min-width: 580px;
      max-width: 900px;
      height: 144px;
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background:
        linear-gradient(180deg, rgba(17,26,50,0.95), rgba(7,11,22,0.96));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.42);
      backdrop-filter: blur(12px);
      opacity: 0;
      z-index: 10;
    }

    .winner-banner.show { animation: winnerInOut 2200ms cubic-bezier(.22,1,.36,1) forwards; }

    .winner-avatar {
      width: 92px;
      height: 92px;
      border-radius: 999px;
      border: 4px solid rgba(255,255,255,0.96);
      background-size: cover;
      background-position: center;
      background-color: #4a5878;
      box-shadow: var(--shadow-soft);
      flex: 0 0 auto;
    }

    .winner-copy { display: flex; flex-direction: column; gap: 2px; text-transform: uppercase; }
    .winner-name { font-size: 3.25rem; line-height: 1; font-weight: 900; color: var(--text); }
    .winner-word { font-size: 1.45rem; letter-spacing: 0.24em; font-weight: 800; color: rgba(255,255,255,0.88); }

    .animate-pop { animation: scorePop 420ms cubic-bezier(.22,1,.36,1); }
    .animate-pulse-left .team.left, .animate-pulse-right .team.right { animation: sidePulse 760ms ease; }
    .animate-pulse-left .lane-glow.left, .animate-pulse-right .lane-glow.right { animation: glowPulse 760ms ease; }
    .animate-avatar-left #leftAvatar, .animate-avatar-right #rightAvatar { animation: avatarBounce 650ms cubic-bezier(.22,1,.36,1); }

    @keyframes scorePop {
      0% { transform: scale(1); filter: brightness(1); }
      35% { transform: scale(1.18); filter: brightness(1.16); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    @keyframes sidePulse {
      0% { transform: translateY(0); }
      30% { transform: translateY(-2px); }
      100% { transform: translateY(0); }
    }
    @keyframes glowPulse {
      0% { opacity: 0.95; transform: scaleX(1); }
      30% { opacity: 1; transform: scaleX(1.2); }
      100% { opacity: 0.95; transform: scaleX(1); }
    }
    @keyframes avatarBounce {
      0% { transform: scale(1); }
      35% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes winnerInOut {
      0% { opacity: 0; transform: translateX(-50%) scale(0.92); }
      12% { opacity: 1; transform: translateX(-50%) scale(1.02); }
      20% { opacity: 1; transform: translateX(-50%) scale(1); }
      84% { opacity: 1; transform: translateX(-50%) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) scale(0.96); }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="overlay" id="overlay">
      <div class="top-plate" id="topPlate">12</div>
      <div class="main-shell">
        <div class="team left" id="leftTeam">
          <div class="player-wrap">
            <div class="avatar" id="leftAvatar"></div>
            <div class="name" id="leftName">Marlon</div>
          </div>
        </div>
        <div class="score-core">
          <div class="score-val" id="leftScore">12</div>
          <div class="score-val" id="rightScore">9</div>
        </div>
        <div class="team right" id="rightTeam">
          <div class="player-wrap">
            <div class="avatar" id="rightAvatar"></div>
            <div class="name" id="rightName">Max</div>
          </div>
        </div>
      </div>
      <div class="lane-glow left"></div>
      <div class="lane-glow right"></div>
      <div class="bottom-plate" id="objectivePlate">Kills</div>
      <div class="winner-banner" id="winnerBanner">
        <div class="winner-avatar" id="winnerAvatar"></div>
        <div class="winner-copy">
          <div class="winner-name" id="winnerName">Marlon</div>
          <div class="winner-word">Winner</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0YwlFwuVu9x4ADSorDdLyb5e1IGaBZj8",
      authDomain: "m3-scoreboard.firebaseapp.com",
      databaseURL: "https://m3-scoreboard-default-rtdb.firebaseio.com",
      projectId: "m3-scoreboard",
      storageBucket: "m3-scoreboard.firebasestorage.app",
      messagingSenderId: "334737513653",
      appId: "1:334737513653:web:74b24cbe4db3e3097f72fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const overlayRef = ref(db, "overlay");

    const fallbackAvatar = "assets/player-placeholder.png";
    const overlayEl = document.getElementById("overlay");
    const topPlateEl = document.getElementById("topPlate");
    const objectivePlateEl = document.getElementById("objectivePlate");
    const leftNameEl = document.getElementById("leftName");
    const rightNameEl = document.getElementById("rightName");
    const leftAvatarEl = document.getElementById("leftAvatar");
    const rightAvatarEl = document.getElementById("rightAvatar");
    const leftScoreEl = document.getElementById("leftScore");
    const rightScoreEl = document.getElementById("rightScore");
    const winnerBannerEl = document.getElementById("winnerBanner");
    const winnerAvatarEl = document.getElementById("winnerAvatar");
    const winnerNameEl = document.getElementById("winnerName");

    let prev = null;
    let lastWinnerId = null;
    let winnerTimer = null;

    function setAvatar(el, src) {
      el.style.backgroundImage = `url('${src || fallbackAvatar}')`;
    }

    function setLeader(leftScore, rightScore, enabled) {
      overlayEl.classList.remove("leader-left", "leader-right");
      if (!enabled) return;
      if (leftScore > rightScore) overlayEl.classList.add("leader-left");
      if (rightScore > leftScore) overlayEl.classList.add("leader-right");
    }

    function pulse(side) {
      const sideClass = side === "left" ? "animate-pulse-left" : "animate-pulse-right";
      const avatarClass = side === "left" ? "animate-avatar-left" : "animate-avatar-right";
      overlayEl.classList.remove("animate-pulse-left", "animate-pulse-right", "animate-avatar-left", "animate-avatar-right");
      void overlayEl.offsetWidth;
      overlayEl.classList.add(sideClass, avatarClass);
      setTimeout(() => overlayEl.classList.remove(sideClass, avatarClass), 780);
    }

    function popScore(el) {
      el.classList.remove("animate-pop");
      void el.offsetWidth;
      el.classList.add("animate-pop");
      setTimeout(() => el.classList.remove("animate-pop"), 430);
    }

    function showWinner(payload, data) {
      if (!payload) return;
      const side = payload.side === "right" ? "right" : "left";
      const name = payload.name || (side === "right" ? data.player2Name : data.player1Name) || (side === "right" ? "Player 2" : "Player 1");
      const avatar = payload.avatar || (side === "right" ? data.player2Avatar : data.player1Avatar) || fallbackAvatar;
      winnerNameEl.textContent = name;
      setAvatar(winnerAvatarEl, avatar);
      winnerBannerEl.classList.remove("show");
      void winnerBannerEl.offsetWidth;
      winnerBannerEl.classList.add("show");
      pulse(side);
      clearTimeout(winnerTimer);
      winnerTimer = setTimeout(() => winnerBannerEl.classList.remove("show"), payload.duration || 2200);
    }

    function applyData(data) {
      const root = document.documentElement;
      const p1Name = data.player1Name || "Player 1";
      const p2Name = data.player2Name || "Player 2";
      const p1Score = Number(data.player1Score ?? 0);
      const p2Score = Number(data.player2Score ?? 0);
      const objective = data.objective || "Score";
      const highlightLeader = data.highlightLeader !== false;
      const animationsEnabled = data.animationsEnabled !== false;
      const scorePopEnabled = data.scorePopEnabled !== false;
      const leaderPulseEnabled = data.leaderPulseEnabled !== false;

      leftNameEl.textContent = p1Name;
      rightNameEl.textContent = p2Name;
      leftScoreEl.textContent = p1Score;
      rightScoreEl.textContent = p2Score;
      topPlateEl.textContent = Math.max(p1Score, p2Score);
      objectivePlateEl.textContent = objective;

      root.style.setProperty("--left-main", data.player1Color || "#2563ff");
      root.style.setProperty("--left-dark", data.player1ColorDark || "#123ec8");
      root.style.setProperty("--right-main", data.player2Color || "#ff315b");
      root.style.setProperty("--right-dark", data.player2ColorDark || "#b50e34");
      root.style.setProperty("--left-glow", data.player1Glow || data.player1Color || "#2563ff");
      root.style.setProperty("--right-glow", data.player2Glow || data.player2Color || "#ff315b");

      setAvatar(leftAvatarEl, data.player1Avatar || fallbackAvatar);
      setAvatar(rightAvatarEl, data.player2Avatar || fallbackAvatar);
      setLeader(p1Score, p2Score, highlightLeader);

      if (prev && animationsEnabled) {
        if (scorePopEnabled) {
          if (p1Score !== prev.p1Score) popScore(leftScoreEl);
          if (p2Score !== prev.p2Score) popScore(rightScoreEl);
        }
        if (leaderPulseEnabled) {
          if (p1Score > prev.p1Score) pulse("left");
          if (p2Score > prev.p2Score) pulse("right");
        }
      }

      if (data.winnerAnimation?.id && data.winnerAnimation.id !== lastWinnerId) {
        lastWinnerId = data.winnerAnimation.id;
        showWinner(data.winnerAnimation, data);
      }

      prev = { p1Score, p2Score };
    }

    onValue(overlayRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      applyData(data);
    });
  </script>
</body>
</html>
