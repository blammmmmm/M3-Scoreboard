<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3 Scoreboard Overlay</title>
  <style>
    :root {
      --left-color-1: #1f5fff;
      --left-color-2: #1237c8;
      --right-color-1: #ff2f58;
      --right-color-2: #b90f35;
      --plate-top: #151a2d;
      --plate-bottom: #090c16;
      --text: #ffffff;
      --shadow: 0 14px 30px rgba(0,0,0,0.35);
      --glow-left: rgba(79, 132, 255, 0.85);
      --glow-right: rgba(255, 88, 120, 0.85);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 20px;
    }
    .overlay {
      position: relative;
      width: 1160px;
      height: 320px;
      filter: drop-shadow(0 20px 35px rgba(0,0,0,0.28));
      user-select: none;
    }
    .main-bar {
      position: absolute;
      inset: 84px 0 auto 0;
      height: 170px;
      display: flex;
      overflow: hidden;
      border-radius: 10px;
      clip-path: polygon(0 0, 100% 0, 100% 76%, 72% 84%, 28% 84%, 0 76%);
    }
    .side {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      padding: 26px 34px;
      color: var(--text);
      transition: box-shadow 240ms ease, transform 240ms ease;
    }
    .side.left {
      justify-content: flex-start;
      background: linear-gradient(90deg, var(--left-color-2) 0%, var(--left-color-1) 68%, #2d72ff 100%);
    }
    .side.right {
      justify-content: flex-end;
      background: linear-gradient(270deg, var(--right-color-2) 0%, var(--right-color-1) 68%, #ff436d 100%);
    }
    .side::after {
      content: "";
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 28px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
      opacity: 0.85;
    }
    .player {
      display: flex;
      align-items: center;
      gap: 28px;
      min-width: 0;
      position: relative;
      z-index: 2;
    }
    .right .player { flex-direction: row-reverse; }
    .avatar {
      width: 138px;
      height: 138px;
      border-radius: 999px;
      border: 5px solid rgba(255,255,255,0.98);
      background-size: cover;
      background-position: center;
      background-image: url('assets/player-placeholder.png');
      flex: 0 0 auto;
      box-shadow: 0 10px 20px rgba(0,0,0,0.22);
      transition: transform 240ms ease, box-shadow 240ms ease, opacity 240ms ease;
    }
    .player-name {
      font-size: 4rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.03em;
      color: var(--text);
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 4px 10px rgba(0,0,0,0.22);
    }
    .score {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 5.2rem;
      line-height: 1;
      font-weight: 900;
      color: var(--text);
      text-shadow: 0 6px 12px rgba(0,0,0,0.25);
      z-index: 3;
      transition: transform 180ms ease, filter 180ms ease;
    }
    .score.left-score { left: 48.2%; transform: translate(-100%, -50%); padding-right: 24px; }
    .score.right-score { right: 48.2%; transform: translate(100%, -50%); padding-left: 24px; }
    .bottom-plate, .top-plate {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, var(--plate-top), var(--plate-bottom));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0.04em;
      z-index: 5;
    }
    .bottom-plate {
      bottom: 22px;
      width: 420px;
      height: 90px;
      clip-path: polygon(8% 0, 92% 0, 100% 36%, 94% 100%, 6% 100%, 0 36%);
      font-size: 3rem;
    }
    .top-plate {
      top: 0;
      width: 340px;
      height: 92px;
      clip-path: polygon(10% 0, 90% 0, 100% 72%, 95% 100%, 5% 100%, 0 72%);
      font-size: 4.5rem;
    }
    .leader-left .side.left { box-shadow: inset 0 0 0 3px rgba(255,255,255,0.18), 0 0 40px rgba(79,132,255,0.28); }
    .leader-right .side.right { box-shadow: inset 0 0 0 3px rgba(255,255,255,0.18), 0 0 40px rgba(255,88,120,0.28); }
    .side-glow {
      position: absolute;
      bottom: 35px;
      width: 180px;
      height: 16px;
      border-radius: 999px;
      filter: blur(2px);
      z-index: 4;
      opacity: 0.9;
      transition: opacity 240ms ease, transform 240ms ease;
    }
    .side-glow.left { left: 28%; background: var(--glow-left); }
    .side-glow.right { right: 28%; background: var(--glow-right); }
    .overlay.compact { width: 900px; height: 240px; }
    .overlay.compact .main-bar { top: 60px; height: 128px; }
    .overlay.compact .avatar { width: 96px; height: 96px; border-width: 4px; }
    .overlay.compact .player-name { font-size: 2.8rem; }
    .overlay.compact .score { font-size: 3.7rem; }
    .overlay.compact .top-plate { width: 250px; height: 68px; font-size: 3rem; }
    .overlay.compact .bottom-plate { width: 310px; height: 68px; font-size: 2rem; bottom: 10px; }
    .animate-pop { animation: scorePop 420ms cubic-bezier(.22,1,.36,1); }
    .animate-pulse-left .side.left, .animate-pulse-right .side.right { animation: sidePulse 850ms ease; }
    .animate-pulse-left .side-glow.left, .animate-pulse-right .side-glow.right { animation: glowPulse 850ms ease; }
    .animate-avatar-left #leftAvatar, .animate-avatar-right #rightAvatar { animation: avatarBounce 700ms cubic-bezier(.22,1,.36,1); }
    .winner-banner {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.86);
      min-width: 520px;
      max-width: 78%;
      height: 150px;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background: linear-gradient(180deg, rgba(9,12,22,0.96), rgba(20,28,44,0.94));
      color: #fff;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      backdrop-filter: blur(12px);
      box-shadow: 0 22px 60px rgba(0,0,0,0.42);
      opacity: 0;
      pointer-events: none;
      z-index: 12;
    }
    .winner-banner.show { animation: winnerInOut 2400ms cubic-bezier(.22,1,.36,1) forwards; }
    .winner-avatar {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      border: 4px solid rgba(255,255,255,0.94);
      background-size: cover;
      background-position: center;
      background-image: url('assets/player-placeholder.png');
      flex: 0 0 auto;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    }
    .winner-copy { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; text-transform: uppercase; }
    .winner-label { font-size: 1.1rem; letter-spacing: 0.26em; opacity: 0.78; font-weight: 700; }
    .winner-name { font-size: 3.3rem; line-height: 1; font-weight: 900; letter-spacing: 0.03em; text-shadow: 0 8px 24px rgba(0,0,0,0.28); }
    .winner-word { font-size: 1.7rem; line-height: 1; font-weight: 900; letter-spacing: 0.18em; opacity: 0.92; }
    @keyframes scorePop {
      0% { transform: translate(var(--score-x, 0), -50%) scale(1); filter: brightness(1); }
      35% { transform: translate(var(--score-x, 0), -50%) scale(1.22); filter: brightness(1.18); }
      100% { transform: translate(var(--score-x, 0), -50%) scale(1); filter: brightness(1); }
    }
    @keyframes sidePulse { 0% { transform: scale(1); } 30% { transform: scale(1.018); } 100% { transform: scale(1); } }
    @keyframes glowPulse { 0% { opacity: 0.9; transform: scaleX(1); } 30% { opacity: 1; transform: scaleX(1.16); } 100% { opacity: 0.9; transform: scaleX(1); } }
    @keyframes avatarBounce { 0% { transform: scale(1); } 35% { transform: scale(1.1); } 100% { transform: scale(1); } }
    @keyframes winnerInOut {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.86); }
      12% { opacity: 1; transform: translate(-50%, -50%) scale(1.03); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      82% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.94); }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="top-plate" id="topPlate">12</div>
    <div class="main-bar">
      <div class="side left">
        <div class="player">
          <div class="avatar" id="leftAvatar"></div>
          <div class="player-name" id="leftName">Marlon</div>
        </div>
      </div>
      <div class="side right">
        <div class="player">
          <div class="avatar" id="rightAvatar"></div>
          <div class="player-name" id="rightName">Max</div>
        </div>
      </div>
    </div>
    <div class="score left-score" id="leftScore">12</div>
    <div class="score right-score" id="rightScore">9</div>
    <div class="side-glow left"></div>
    <div class="side-glow right"></div>
    <div class="bottom-plate" id="bottomPlate">Kills</div>
    <div class="winner-banner" id="winnerBanner">
      <div class="winner-avatar" id="winnerAvatar"></div>
      <div class="winner-copy">
        <div class="winner-label">Match Result</div>
        <div class="winner-name" id="winnerName">Marlon</div>
        <div class="winner-word">Winner</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0YwlFwuVu9x4ADSorDdLyb5e1IGaBZj8",
      authDomain: "m3-scoreboard.firebaseapp.com",
      databaseURL: "https://m3-scoreboard-default-rtdb.firebaseio.com",
      projectId: "m3-scoreboard",
      storageBucket: "m3-scoreboard.firebasestorage.app",
      messagingSenderId: "334737513653",
      appId: "1:334737513653:web:74b24cbe4db3e3097f72fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const overlayRef = ref(db, "overlay");

    const overlayEl = document.getElementById('overlay');
    const topPlateEl = document.getElementById('topPlate');
    const leftNameEl = document.getElementById('leftName');
    const rightNameEl = document.getElementById('rightName');
    const leftScoreEl = document.getElementById('leftScore');
    const rightScoreEl = document.getElementById('rightScore');
    const leftAvatarEl = document.getElementById('leftAvatar');
    const rightAvatarEl = document.getElementById('rightAvatar');
    const bottomPlateEl = document.getElementById('bottomPlate');
    const winnerBannerEl = document.getElementById('winnerBanner');
    const winnerAvatarEl = document.getElementById('winnerAvatar');
    const winnerNameEl = document.getElementById('winnerName');

    let previousData = null;
    let winnerAnimationTimeout = null;
    let lastWinnerAnimationId = null;

    leftScoreEl.style.setProperty('--score-x', '-100%');
    rightScoreEl.style.setProperty('--score-x', '100%');

    function flashScore(whichSide) {
      const el = whichSide === 'left' ? leftScoreEl : rightScoreEl;
      el.classList.remove('animate-pop');
      void el.offsetWidth;
      el.classList.add('animate-pop');
      setTimeout(() => el.classList.remove('animate-pop'), 430);
    }

    function pulseSide(whichSide) {
      const pulseClass = whichSide === 'left' ? 'animate-pulse-left' : 'animate-pulse-right';
      const avatarClass = whichSide === 'left' ? 'animate-avatar-left' : 'animate-avatar-right';
      overlayEl.classList.remove('animate-pulse-left', 'animate-pulse-right', 'animate-avatar-left', 'animate-avatar-right');
      void overlayEl.offsetWidth;
      overlayEl.classList.add(pulseClass, avatarClass);
      setTimeout(() => overlayEl.classList.remove(pulseClass, avatarClass), 900);
    }

    function updateLeaderClasses(leftScore, rightScore, highlightLeader = true) {
      overlayEl.classList.remove('leader-left', 'leader-right');
      if (!highlightLeader) return;
      if (leftScore > rightScore) overlayEl.classList.add('leader-left');
      else if (rightScore > leftScore) overlayEl.classList.add('leader-right');
    }

    function showWinnerBanner(payload) {
      const winnerSide = payload?.side === 'right' ? 'right' : 'left';
      const winnerName = winnerSide === 'right' ? (payload?.name || rightNameEl.textContent || 'Player 2') : (payload?.name || leftNameEl.textContent || 'Player 1');
      const winnerAvatar = winnerSide === 'right' ? (payload?.avatar || rightAvatarEl.dataset.src || 'assets/player-placeholder.png') : (payload?.avatar || leftAvatarEl.dataset.src || 'assets/player-placeholder.png');

      winnerNameEl.textContent = winnerName;
      winnerAvatarEl.style.backgroundImage = `url('${winnerAvatar}')`;
      winnerBannerEl.classList.remove('show');
      void winnerBannerEl.offsetWidth;
      winnerBannerEl.classList.add('show');

      overlayEl.classList.remove('animate-pulse-left', 'animate-pulse-right');
      overlayEl.classList.add(winnerSide === 'left' ? 'animate-pulse-left' : 'animate-pulse-right');

      clearTimeout(winnerAnimationTimeout);
      winnerAnimationTimeout = setTimeout(() => {
        winnerBannerEl.classList.remove('show');
        overlayEl.classList.remove('animate-pulse-left', 'animate-pulse-right');
      }, payload?.duration || 2400);
    }

    onValue(overlayRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      const root = document.documentElement;
      const leftName = data.player1Name || 'Player 1';
      const rightName = data.player2Name || 'Player 2';
      const leftScore = Number(data.player1Score ?? 0);
      const rightScore = Number(data.player2Score ?? 0);
      const objective = data.objective || 'Score';
      const leftAvatar = data.player1Avatar || 'assets/player-placeholder.png';
      const rightAvatar = data.player2Avatar || 'assets/player-placeholder.png';
      const animationsEnabled = data.animationsEnabled !== false;
      const scorePopEnabled = data.scorePopEnabled !== false;
      const leaderPulseEnabled = data.leaderPulseEnabled !== false;
      const highlightLeader = data.highlightLeader !== false;
      const topPlateMode = data.topPlateMode || 'leader';

      leftNameEl.textContent = leftName;
      rightNameEl.textContent = rightName;
      leftScoreEl.textContent = leftScore;
      rightScoreEl.textContent = rightScore;
      bottomPlateEl.textContent = objective;
      leftAvatarEl.style.backgroundImage = `url('${leftAvatar}')`;
      rightAvatarEl.style.backgroundImage = `url('${rightAvatar}')`;
      leftAvatarEl.dataset.src = leftAvatar;
      rightAvatarEl.dataset.src = rightAvatar;

      if (data.player1Color) root.style.setProperty('--left-color-1', data.player1Color);
      if (data.player1ColorDark) root.style.setProperty('--left-color-2', data.player1ColorDark);
      if (data.player2Color) root.style.setProperty('--right-color-1', data.player2Color);
      if (data.player2ColorDark) root.style.setProperty('--right-color-2', data.player2ColorDark);
      if (data.player1Glow) root.style.setProperty('--glow-left', data.player1Glow);
      if (data.player2Glow) root.style.setProperty('--glow-right', data.player2Glow);

      overlayEl.classList.toggle('compact', data.compact === true);
      updateLeaderClasses(leftScore, rightScore, highlightLeader);

      if (topPlateMode === 'leader') {
        topPlateEl.textContent = String(Math.max(leftScore, rightScore));
        topPlateEl.style.display = 'flex';
      } else if (topPlateMode === 'objective') {
        topPlateEl.textContent = objective.toUpperCase();
        topPlateEl.style.display = 'flex';
      } else {
        topPlateEl.style.display = 'none';
      }

      if (previousData && animationsEnabled) {
        if (scorePopEnabled) {
          if (leftScore !== Number(previousData.player1Score ?? 0)) flashScore('left');
          if (rightScore !== Number(previousData.player2Score ?? 0)) flashScore('right');
        }
        if (leaderPulseEnabled) {
          if (leftScore > Number(previousData.player1Score ?? 0)) pulseSide('left');
          if (rightScore > Number(previousData.player2Score ?? 0)) pulseSide('right');
        }
      }

      const winnerAnimation = data.winnerAnimation;
      if (winnerAnimation && winnerAnimation.id && winnerAnimation.id !== lastWinnerAnimationId) {
        lastWinnerAnimationId = winnerAnimation.id;
        showWinnerBanner(winnerAnimation);
      }

      previousData = { player1Score: leftScore, player2Score: rightScore };
    });
  </script>
</body>
</html>
