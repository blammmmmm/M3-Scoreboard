<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3 Scoreboard Controller</title>
  <style>
    :root {
      --bg: #0d1220;
      --panel: #151c2e;
      --panel-2: #11182a;
      --text: #eef3ff;
      --muted: #95a3c7;
      --border: rgba(255,255,255,0.08);
      --blue: #1f5fff;
      --red: #ff2f58;
      --green: #1ecb7a;
      --yellow: #f4c34e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #0b1020 0%, #131a2e 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 20px;
    }
    .title {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }
    .sub { color: var(--muted); margin-top: 6px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }
    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
    }
    .panel h2 { margin: 0 0 14px; font-size: 1.05rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .row { display: grid; gap: 10px; margin-bottom: 12px; }
    .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    label { font-size: 0.86rem; color: var(--muted); }
    input, select {
      width: 100%;
      margin-top: 6px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }
    input[type="checkbox"] { width: auto; margin: 0; }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }
    button:hover { transform: translateY(-1px); }
    button.blue { background: var(--blue); }
    button.red { background: var(--red); }
    button.green { background: var(--green); }
    button.yellow { background: var(--yellow); color: #1a1e28; }
    button.ghost { background: #29324a; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
    }
    .status {
      padding: 12px 14px;
      border-radius: 12px;
      background: #0f1728;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .full { grid-column: 1 / -1; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="title">M3 Scoreboard Controller</div>
      <div class="sub">Edit names, colors, scores, avatars, objective, and trigger the winner banner live in OBS.</div>
    </div>

    <div class="status" id="status">Connecting to Firebase…</div>

    <div class="grid">
      <div class="panel">
        <h2>Left Player</h2>
        <div class="row two">
          <label>Name<input id="player1Name" value="Marlon"></label>
          <label>Score<input id="player1Score" type="number" value="12"></label>
        </div>
        <div class="row two">
          <label>Primary Color<input id="player1Color" type="color" value="#1f5fff"></label>
          <label>Dark Color<input id="player1ColorDark" type="color" value="#1237c8"></label>
        </div>
        <div class="row">
          <label>Avatar URL / path<input id="player1Avatar" value="assets/player-placeholder.png"></label>
        </div>
        <div class="btn-row">
          <button class="blue" id="player1Plus">+1 Left</button>
          <button class="ghost" id="player1Minus">-1 Left</button>
          <button class="yellow" id="winnerLeft">Winner Left</button>
        </div>
      </div>

      <div class="panel">
        <h2>Right Player</h2>
        <div class="row two">
          <label>Name<input id="player2Name" value="Max"></label>
          <label>Score<input id="player2Score" type="number" value="9"></label>
        </div>
        <div class="row two">
          <label>Primary Color<input id="player2Color" type="color" value="#ff2f58"></label>
          <label>Dark Color<input id="player2ColorDark" type="color" value="#b90f35"></label>
        </div>
        <div class="row">
          <label>Avatar URL / path<input id="player2Avatar" value="assets/player-placeholder.png"></label>
        </div>
        <div class="btn-row">
          <button class="red" id="player2Plus">+1 Right</button>
          <button class="ghost" id="player2Minus">-1 Right</button>
          <button class="yellow" id="winnerRight">Winner Right</button>
        </div>
      </div>

      <div class="panel full">
        <h2>Match Settings</h2>
        <div class="row three">
          <label>Objective<input id="objective" value="Kills"></label>
          <label>Top Plate Mode
            <select id="topPlateMode">
              <option value="leader">Leader Score</option>
              <option value="objective">Objective</option>
              <option value="hidden">Hidden</option>
            </select>
          </label>
          <label>Compact Mode
            <select id="compact">
              <option value="false">Off</option>
              <option value="true">On</option>
            </select>
          </label>
        </div>

        <div class="row three">
          <div class="toggle"><input type="checkbox" id="animationsEnabled" checked><label for="animationsEnabled">Animations Enabled</label></div>
          <div class="toggle"><input type="checkbox" id="scorePopEnabled" checked><label for="scorePopEnabled">Score Pop</label></div>
          <div class="toggle"><input type="checkbox" id="leaderPulseEnabled" checked><label for="leaderPulseEnabled">Leader Pulse</label></div>
        </div>
        <div class="row three">
          <div class="toggle"><input type="checkbox" id="highlightLeader" checked><label for="highlightLeader">Highlight Leader</label></div>
          <label>Winner Banner Duration (ms)<input id="winnerDuration" type="number" value="2400"></label>
          <div></div>
        </div>

        <div class="btn-row">
          <button class="green" id="saveAll">Save All</button>
          <button class="ghost" id="swapSides">Swap Sides</button>
          <button class="ghost" id="resetScores">Reset Scores</button>
          <button class="ghost" id="seedDefaults">Seed Defaults</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0YwlFwuVu9x4ADSorDdLyb5e1IGaBZj8",
      authDomain: "m3-scoreboard.firebaseapp.com",
      databaseURL: "https://m3-scoreboard-default-rtdb.firebaseio.com",
      projectId: "m3-scoreboard",
      storageBucket: "m3-scoreboard.firebasestorage.app",
      messagingSenderId: "334737513653",
      appId: "1:334737513653:web:74b24cbe4db3e3097f72fc"
    };

    const defaults = {
      player1Name: 'Marlon',
      player2Name: 'Max',
      player1Score: 12,
      player2Score: 9,
      objective: 'Kills',
      player1Color: '#1f5fff',
      player1ColorDark: '#1237c8',
      player2Color: '#ff2f58',
      player2ColorDark: '#b90f35',
      player1Glow: 'rgba(79, 132, 255, 0.85)',
      player2Glow: 'rgba(255, 88, 120, 0.85)',
      player1Avatar: 'assets/player-placeholder.png',
      player2Avatar: 'assets/player-placeholder.png',
      animationsEnabled: true,
      scorePopEnabled: true,
      leaderPulseEnabled: true,
      highlightLeader: true,
      compact: false,
      topPlateMode: 'leader'
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const overlayRef = ref(db, 'overlay');
    const statusEl = document.getElementById('status');

    const ids = [
      'player1Name','player2Name','player1Score','player2Score','objective','player1Color','player1ColorDark','player2Color','player2ColorDark','player1Avatar','player2Avatar','topPlateMode','compact','animationsEnabled','scorePopEnabled','leaderPulseEnabled','highlightLeader','winnerDuration'
    ];
    const el = Object.fromEntries(ids.map(id => [id, document.getElementById(id)]));

    function readForm() {
      return {
        player1Name: el.player1Name.value.trim() || 'Player 1',
        player2Name: el.player2Name.value.trim() || 'Player 2',
        player1Score: Number(el.player1Score.value || 0),
        player2Score: Number(el.player2Score.value || 0),
        objective: el.objective.value.trim() || 'Score',
        player1Color: el.player1Color.value,
        player1ColorDark: el.player1ColorDark.value,
        player2Color: el.player2Color.value,
        player2ColorDark: el.player2ColorDark.value,
        player1Glow: hexToRgba(el.player1Color.value, 0.85),
        player2Glow: hexToRgba(el.player2Color.value, 0.85),
        player1Avatar: el.player1Avatar.value.trim() || 'assets/player-placeholder.png',
        player2Avatar: el.player2Avatar.value.trim() || 'assets/player-placeholder.png',
        topPlateMode: el.topPlateMode.value,
        compact: el.compact.value === 'true',
        animationsEnabled: el.animationsEnabled.checked,
        scorePopEnabled: el.scorePopEnabled.checked,
        leaderPulseEnabled: el.leaderPulseEnabled.checked,
        highlightLeader: el.highlightLeader.checked
      };
    }

    function fillForm(data) {
      const merged = { ...defaults, ...data };
      el.player1Name.value = merged.player1Name;
      el.player2Name.value = merged.player2Name;
      el.player1Score.value = merged.player1Score;
      el.player2Score.value = merged.player2Score;
      el.objective.value = merged.objective;
      el.player1Color.value = merged.player1Color;
      el.player1ColorDark.value = merged.player1ColorDark;
      el.player2Color.value = merged.player2Color;
      el.player2ColorDark.value = merged.player2ColorDark;
      el.player1Avatar.value = merged.player1Avatar;
      el.player2Avatar.value = merged.player2Avatar;
      el.topPlateMode.value = merged.topPlateMode;
      el.compact.value = String(merged.compact);
      el.animationsEnabled.checked = merged.animationsEnabled;
      el.scorePopEnabled.checked = merged.scorePopEnabled;
      el.leaderPulseEnabled.checked = merged.leaderPulseEnabled;
      el.highlightLeader.checked = merged.highlightLeader;
    }

    function hexToRgba(hex, alpha) {
      const value = hex.replace('#', '');
      const normalized = value.length === 3 ? value.split('').map(c => c + c).join('') : value;
      const int = parseInt(normalized, 16);
      const r = (int >> 16) & 255;
      const g = (int >> 8) & 255;
      const b = int & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    async function saveAll() {
      const payload = readForm();
      await update(overlayRef, payload);
      statusEl.textContent = 'Saved to Firebase.';
    }

    async function adjustScore(side, amount) {
      const scoreEl = side === 'left' ? el.player1Score : el.player2Score;
      scoreEl.value = Math.max(0, Number(scoreEl.value || 0) + amount);
      await saveAll();
    }

    async function triggerWinner(side) {
      const payload = readForm();
      await update(overlayRef, {
        ...payload,
        winnerAnimation: {
          id: Date.now(),
          side,
          name: side === 'left' ? payload.player1Name : payload.player2Name,
          avatar: side === 'left' ? payload.player1Avatar : payload.player2Avatar,
          duration: Number(el.winnerDuration.value || 2400)
        }
      });
      statusEl.textContent = `Winner animation triggered for ${side}.`;
    }

    async function swapSides() {
      const current = readForm();
      const swapped = {
        ...current,
        player1Name: current.player2Name,
        player2Name: current.player1Name,
        player1Score: current.player2Score,
        player2Score: current.player1Score,
        player1Color: current.player2Color,
        player1ColorDark: current.player2ColorDark,
        player2Color: current.player1Color,
        player2ColorDark: current.player1ColorDark,
        player1Avatar: current.player2Avatar,
        player2Avatar: current.player1Avatar
      };
      fillForm(swapped);
      await update(overlayRef, {
        ...swapped,
        player1Glow: hexToRgba(swapped.player1Color, 0.85),
        player2Glow: hexToRgba(swapped.player2Color, 0.85)
      });
      statusEl.textContent = 'Sides swapped.';
    }

    async function resetScores() {
      el.player1Score.value = 0;
      el.player2Score.value = 0;
      await saveAll();
      statusEl.textContent = 'Scores reset.';
    }

    async function seedDefaults() {
      fillForm(defaults);
      await set(overlayRef, defaults);
      statusEl.textContent = 'Defaults seeded to Firebase.';
    }

    document.getElementById('saveAll').addEventListener('click', saveAll);
    document.getElementById('player1Plus').addEventListener('click', () => adjustScore('left', 1));
    document.getElementById('player1Minus').addEventListener('click', () => adjustScore('left', -1));
    document.getElementById('player2Plus').addEventListener('click', () => adjustScore('right', 1));
    document.getElementById('player2Minus').addEventListener('click', () => adjustScore('right', -1));
    document.getElementById('winnerLeft').addEventListener('click', () => triggerWinner('left'));
    document.getElementById('winnerRight').addEventListener('click', () => triggerWinner('right'));
    document.getElementById('swapSides').addEventListener('click', swapSides);
    document.getElementById('resetScores').addEventListener('click', resetScores);
    document.getElementById('seedDefaults').addEventListener('click', seedDefaults);

    for (const input of Object.values(el)) {
      input.addEventListener('change', saveAll);
    }

    try {
      const snap = await get(overlayRef);
      if (snap.exists()) {
        fillForm({ ...defaults, ...snap.val() });
        statusEl.textContent = 'Connected. Loaded current overlay state from Firebase.';
      } else {
        fillForm(defaults);
        await set(overlayRef, defaults);
        statusEl.textContent = 'Connected. Seeded default overlay state.';
      }
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'Firebase error. Check your rules and database URL.';
    }
  </script>
</body>
</html>
