<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3 Scoreboard Controller</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a30;
      --panel-2: #1a2544;
      --text: #f5f7ff;
      --muted: #9fb0d8;
      --stroke: rgba(255,255,255,0.08);
      --accent: #4f78ff;
      --danger: #ff426d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #08101f, #0d1324);
      color: var(--text);
      padding: 28px;
    }
    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      gap: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 22px;
    }
    .card {
      background: linear-gradient(180deg, rgba(26,37,68,0.96), rgba(15,22,40,0.98));
      border: 1px solid var(--stroke);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.24);
    }
    .col-4 { grid-column: span 4; }
    .col-6 { grid-column: span 6; }
    .col-12 { grid-column: span 12; }
    h1, h2 { margin: 0 0 14px; }
    h1 { font-size: 2rem; }
    h2 { font-size: 1.1rem; color: #fff; }
    p { margin: 0 0 8px; color: var(--muted); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    label { display: block; font-size: 0.9rem; color: var(--muted); margin-bottom: 6px; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #fff;
      outline: none;
      font-size: 0.95rem;
    }
    .btn-row, .score-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(180deg, #365fff, #2446c4);
    }
    button.alt { background: linear-gradient(180deg, #2b3658, #1c243f); }
    button.red { background: linear-gradient(180deg, #ff4c74, #cc234c); }
    button.gray { background: linear-gradient(180deg, #44506e, #313b54); }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.06);
      color: var(--muted); font-size: 0.9rem;
    }
    .save { background: linear-gradient(180deg, #53d08e, #2da565); }
    .full { width: 100%; }
    .small { font-size: 0.86rem; }
    @media (max-width: 1050px) {
      .col-4, .col-6 { grid-column: span 12; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>M3 Scoreboard Controller</h1>
      <p>Clean controller for the refined premium overlay build.</p>
    </div>

    <div class="grid">
      <div class="card col-6">
        <h2>Player 1</h2>
        <div class="row">
          <div><label>Name</label><input id="p1Name" placeholder="Marlon" /></div>
          <div><label>Avatar</label><select id="p1Avatar"><option value="assets/Marlon Scoreboard.jpeg">Marlon</option><option value="assets/PlaqueBoyMax Scoreboard.webp">Max</option><option value="assets/player-placeholder.png">Placeholder</option></select></div>
        </div>
        <div class="row">
          <div><label>Main Color</label><input id="p1Color" placeholder="#2563ff" /></div>
          <div><label>Dark Color</label><input id="p1ColorDark" placeholder="#123ec8" /></div>
        </div>
        <div class="score-row">
          <button id="p1Minus" class="gray">-1</button>
          <input id="p1Score" type="number" value="12" style="max-width:120px" />
          <button id="p1Plus">+1</button>
          <button id="p1Winner" class="save">Winner</button>
        </div>
      </div>

      <div class="card col-6">
        <h2>Player 2</h2>
        <div class="row">
          <div><label>Name</label><input id="p2Name" placeholder="Max" /></div>
          <div><label>Avatar</label><select id="p2Avatar"><option value="assets/PlaqueBoyMax Scoreboard.webp">Max</option><option value="assets/Marlon Scoreboard.jpeg">Marlon</option><option value="assets/player-placeholder.png">Placeholder</option></select></div>
        </div>
        <div class="row">
          <div><label>Main Color</label><input id="p2Color" placeholder="#ff315b" /></div>
          <div><label>Dark Color</label><input id="p2ColorDark" placeholder="#b50e34" /></div>
        </div>
        <div class="score-row">
          <button id="p2Minus" class="gray">-1</button>
          <input id="p2Score" type="number" value="9" style="max-width:120px" />
          <button id="p2Plus">+1</button>
          <button id="p2Winner" class="save">Winner</button>
        </div>
      </div>

      <div class="card col-4">
        <h2>Match</h2>
        <div class="row">
          <div><label>Objective</label><input id="objective" placeholder="Kills" /></div>
          <div><label>Winner Duration (ms)</label><input id="winnerDuration" type="number" value="2200" /></div>
        </div>
        <div class="btn-row">
          <button id="saveAll" class="full">Save Overlay State</button>
        </div>
      </div>

      <div class="card col-4">
        <h2>Toggles</h2>
        <div class="row">
          <div><label>Animations</label><select id="animationsEnabled"><option value="true">On</option><option value="false">Off</option></select></div>
          <div><label>Score Pop</label><select id="scorePopEnabled"><option value="true">On</option><option value="false">Off</option></select></div>
        </div>
        <div class="row">
          <div><label>Leader Pulse</label><select id="leaderPulseEnabled"><option value="true">On</option><option value="false">Off</option></select></div>
          <div><label>Leader Highlight</label><select id="highlightLeader"><option value="true">On</option><option value="false">Off</option></select></div>
        </div>
      </div>

      <div class="card col-4">
        <h2>Quick Actions</h2>
        <div class="btn-row">
          <button id="swapScores" class="alt">Swap Scores</button>
          <button id="swapPlayers" class="alt">Swap Players</button>
          <button id="resetScores" class="red">Reset Scores</button>
        </div>
        <div class="btn-row">
          <span class="pill" id="status">Ready</span>
        </div>
      </div>

      <div class="card col-12">
        <h2>Avatar Presets</h2>
        <p class="small">Dropdowns now include the current scoreboard portraits for Marlon and Max. Select the matching preset instead of typing asset paths manually.</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0YwlFwuVu9x4ADSorDdLyb5e1IGaBZj8",
      authDomain: "m3-scoreboard.firebaseapp.com",
      databaseURL: "https://m3-scoreboard-default-rtdb.firebaseio.com",
      projectId: "m3-scoreboard",
      storageBucket: "m3-scoreboard.firebasestorage.app",
      messagingSenderId: "334737513653",
      appId: "1:334737513653:web:74b24cbe4db3e3097f72fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const overlayRef = ref(db, 'overlay');
    const $ = (id) => document.getElementById(id);
    const status = $('status');

    function boolVal(id) { return $(id).value === 'true'; }
    function numVal(id) { return Number($(id).value || 0); }
    function value(id) { return $(id).value.trim(); }
    function stamp(message) { status.textContent = message; setTimeout(() => status.textContent = 'Ready', 1800); }

    function stateFromForm() {
      return {
        player1Name: value('p1Name') || 'Player 1',
        player2Name: value('p2Name') || 'Player 2',
        player1Score: numVal('p1Score'),
        player2Score: numVal('p2Score'),
        player1Avatar: value('p1Avatar') || 'assets/player-placeholder.png',
        player2Avatar: value('p2Avatar') || 'assets/player-placeholder.png',
        player1Color: value('p1Color') || '#2563ff',
        player1ColorDark: value('p1ColorDark') || '#123ec8',
        player2Color: value('p2Color') || '#ff315b',
        player2ColorDark: value('p2ColorDark') || '#b50e34',
        objective: value('objective') || 'Score',
        animationsEnabled: boolVal('animationsEnabled'),
        scorePopEnabled: boolVal('scorePopEnabled'),
        leaderPulseEnabled: boolVal('leaderPulseEnabled'),
        highlightLeader: boolVal('highlightLeader')
      };
    }

    async function saveState(extra = {}) {
      await update(overlayRef, { ...stateFromForm(), ...extra });
    }

    async function loadState() {
      const snap = await get(overlayRef);
      const data = snap.val() || {};
      $('p1Name').value = data.player1Name || 'Marlon';
      $('p2Name').value = data.player2Name || 'Max';
      $('p1Score').value = data.player1Score ?? 12;
      $('p2Score').value = data.player2Score ?? 9;
      $('p1Avatar').value = data.player1Avatar || 'assets/player-placeholder.png';
      $('p2Avatar').value = data.player2Avatar || 'assets/player-placeholder.png';
      $('p1Color').value = data.player1Color || '#2563ff';
      $('p1ColorDark').value = data.player1ColorDark || '#123ec8';
      $('p2Color').value = data.player2Color || '#ff315b';
      $('p2ColorDark').value = data.player2ColorDark || '#b50e34';
      $('objective').value = data.objective || 'Kills';
      $('animationsEnabled').value = String(data.animationsEnabled !== false);
      $('scorePopEnabled').value = String(data.scorePopEnabled !== false);
      $('leaderPulseEnabled').value = String(data.leaderPulseEnabled !== false);
      $('highlightLeader').value = String(data.highlightLeader !== false);
    }

    $('saveAll').addEventListener('click', async () => { await saveState(); stamp('Saved'); });
    $('p1Plus').addEventListener('click', async () => { $('p1Score').value = numVal('p1Score') + 1; await saveState(); });
    $('p1Minus').addEventListener('click', async () => { $('p1Score').value = Math.max(0, numVal('p1Score') - 1); await saveState(); });
    $('p2Plus').addEventListener('click', async () => { $('p2Score').value = numVal('p2Score') + 1; await saveState(); });
    $('p2Minus').addEventListener('click', async () => { $('p2Score').value = Math.max(0, numVal('p2Score') - 1); await saveState(); });

    $('resetScores').addEventListener('click', async () => {
      $('p1Score').value = 0; $('p2Score').value = 0; await saveState(); stamp('Scores reset');
    });

    $('swapScores').addEventListener('click', async () => {
      const a = $('p1Score').value; $('p1Score').value = $('p2Score').value; $('p2Score').value = a; await saveState(); stamp('Scores swapped');
    });

    $('swapPlayers').addEventListener('click', async () => {
      const ids = [['p1Name','p2Name'],['p1Avatar','p2Avatar'],['p1Color','p2Color'],['p1ColorDark','p2ColorDark'],['p1Score','p2Score']];
      ids.forEach(([a,b]) => { const temp = $(a).value; $(a).value = $(b).value; $(b).value = temp; });
      await saveState(); stamp('Players swapped');
    });

    async function triggerWinner(side) {
      await saveState({
        winnerAnimation: {
          id: Date.now(),
          side,
          duration: numVal('winnerDuration') || 2200
        }
      });
      stamp(`${side === 'left' ? value('p1Name') || 'Player 1' : value('p2Name') || 'Player 2'} winner`);
    }

    $('p1Winner').addEventListener('click', () => triggerWinner('left'));
    $('p2Winner').addEventListener('click', () => triggerWinner('right'));

    loadState();
  </script>
</body>
</html>
